name: Build and Release MindSQL

on:
  push:
    tags:
      - 'v*' # This runs only when you push a version tag like v1.0, v1.1, etc.

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --clean --collect-all llama_cpp --name "MindSQL-${{ matrix.os }}" main_ac.py

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/MindSQL-windows-latest.exe
          dist/MindSQL-ubuntu-latest
          dist/MindSQL-macos-latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
