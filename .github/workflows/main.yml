name: Build and Release MindSQL

on:
  push:
    tags:
      - 'v*' # Triggered by tags like v1.0.0
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Linux Build Tools
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y build-essential python3-dev

    # Windows & Ubuntu Step: Uses pre-built CPU wheels to avoid "Building Wheel" errors
    - name: Install Dependencies (Windows & Ubuntu)
      if: matrix.os != 'macos-latest'
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install llama-cpp-python --prefer-binary --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu
        pip install -r requirements.txt

    # macOS Step: Forces binary-only install to prevent the 20-minute compilation hang
    - name: Install Dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install llama-cpp-python --only-binary=:all: --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/metal || pip install llama-cpp-python --only-binary=:all:
        pip install -r requirements.txt
        
    - name: Build with PyInstaller
      # Combined into one line to fix the Windows/PowerShell line-break error
      run: pyinstaller --onefile --clean --collect-all llama_cpp --name "MindSQL-${{ matrix.os }}" main_ac.py

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/MindSQL-windows-latest.exe
          dist/MindSQL-ubuntu-latest
          dist/MindSQL-macos-latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
