# Authors : Adam felanso Sijo , Akhildev C Vasudevan ,Alex Chittilappilly, Alvin N.S
# Project: MindSQL NL2SQL Tool

name: Build and Release MindSQL

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Linux Build Tools
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y build-essential python3-dev

    - name: Install Compilers and Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install llama-cpp-python --prefer-binary --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: pyinstaller --onefile --clean --collect-all llama_cpp --name "MindSQL-${{ matrix.os }}" main_ac.py

    # IMPORTANT: Save the file to a "waiting room" instead of releasing immediately
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MindSQL-${{ matrix.os }}
        path: dist/MindSQL-*

  publish:
    name: Create Final Release
    needs: build # This makes this job WAIT for both Windows and Ubuntu to finish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/MindSQL-windows-latest/MindSQL-windows-latest.exe
          ./artifacts/MindSQL-ubuntu-latest/MindSQL-ubuntu-latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
